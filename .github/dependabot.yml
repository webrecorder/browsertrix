---
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 7
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/emails"
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 7
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 7
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
